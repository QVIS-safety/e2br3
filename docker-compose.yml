# Docker Compose for local development
# Usage: docker compose up -d

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16
    container_name: e2br3-postgres
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: dev_only_pwd
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount SQL init scripts (runs on first startup only)
      - ./db:/db:ro
      - ./scripts/db/list_init_sql.sh:/app-scripts/list_init_sql.sh:ro
      - ./deploy/docker/postgres-init/01-run-all.sh:/docker-entrypoint-initdb.d/01-run-all.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Web Server Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e2br3-web-server
    ports:
      - "8080:8080"
    environment:
      # Skip dev database init (DB is initialized via PostgreSQL init scripts)
      SKIP_DEV_INIT: "1"
      # Bind to all interfaces (required for Docker)
      SERVICE_BIND_ADDR: "0.0.0.0:8080"
      # Database connection (use 'postgres' as host - the service name)
      SERVICE_DB_URL: postgres://app_user:dev_only_pwd@postgres/app_db
      # Auth keys (dev only - use Secrets Manager in production)
      SERVICE_PWD_KEY: CKUGFOD9_2Qf6Pn3ZFRYgPYb8ht4vKqEG9PGMXTB7497bT0367DjoaD6ydFnEVaIRda0kKeBZVCT5Hb62m2sCA
      SERVICE_TOKEN_KEY: 9FoHBmkyxbgu_xFoQK7e0jz3RMNVJWgfvbVn712FBNH9LLaAWS3CS6Zpcg6RveiObvCUb6a2z-uAiLjhLh2igw
      SERVICE_TOKEN_DURATION_SEC: "1800"
      SERVICE_WEB_FOLDER: "/app/web-folder/"
      RUST_LOG: "web_server=debug,lib_core=debug,lib_web=debug"
      E2BR3_APP_NAME: "${E2BR3_APP_NAME:-QVIS Safety}"
      E2BR3_APP_SHORT_NAME: "${E2BR3_APP_SHORT_NAME:-QVIS Safety}"
      E2BR3_VALIDATOR_TOKEN: "validator-secret"
      # XML validation/export config
      E2BR3_SKIP_XML_VALIDATE: "1"
      E2BR3_EXPORT_VALIDATE: "1"
      E2BR3_DEFAULT_MESSAGE_SENDER: "DSJP"
      E2BR3_DEFAULT_MESSAGE_RECEIVER_FDA: "CDER"
      E2BR3_DEFAULT_MESSAGE_RECEIVER_ICH: "ICHTEST"
      E2BR3_DEFAULT_MESSAGE_RECEIVER_MFDS: "MFDS"
      E2BR3_EXAMPLES_DIR: "/app/docs/refs/instances"
      E2BR3_XSD_PATH: "/app/schemas/multicacheschemas/MCCI_IN200100UV01.xsd"
      # Prefer patching raw imported XML for single-section edits (keeps export valid while XML v2 generator matures).
      XML_V2_PATCH_C: "1"
    volumes:
      - /Users/hyundonghoon/Documents/4_ICH_ICSR_Schema_Files:/app/schemas:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
