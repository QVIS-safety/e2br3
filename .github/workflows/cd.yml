name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation to run"
        required: true
        type: choice
        default: deploy
        options:
          - deploy
          - terminology-dry-run
          - terminology-load
      dictionary:
        description: "Terminology dictionary for terminology operations"
        required: false
        type: choice
        default: meddra
        options:
          - meddra
          - whodrug
      input_path:
        description: "EC2 path to terminology source file"
        required: false
        type: string
      version:
        description: "Terminology release version"
        required: false
        type: string
      language:
        description: "Terminology language"
        required: false
        type: string
        default: en
      image_ref:
        description: "Optional runtime image ref for manual deploy"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  RUNTIME_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/e2br3-web-server

jobs:
  publish:
    name: Build and Publish Runtime Image
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && inputs.operation == 'deploy' && inputs.image_ref == '') }}
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image ref
        id: image
        env:
          CHECKOUT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -eu
          image_ref="${RUNTIME_IMAGE_NAME}:${CHECKOUT_SHA}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
          echo "IMAGE_REF=${image_ref}" >> "${GITHUB_ENV}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RUNTIME_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published SHA image
        run: |
          set -eu
          echo "Verifying published image: ${IMAGE_REF}"
          docker pull "${IMAGE_REF}"
          docker image inspect "${IMAGE_REF}" --format '{{json .RepoDigests}}'

  deploy:
    name: Deploy Demo EC2
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ always() && ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && inputs.operation == 'deploy')) }}

    steps:
      - name: Resolve image ref
        id: image
        env:
          INPUT_IMAGE_REF: ${{ inputs.image_ref }}
          PUBLISHED_IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
        run: |
          set -eu
          image_ref="${INPUT_IMAGE_REF:-${PUBLISHED_IMAGE_REF:-}}"
          if [ -z "${image_ref}" ]; then
            echo "No image_ref was provided or published." >&2
            exit 1
          fi
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via AWS Systems Manager
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_SSM_TARGET: ${{ secrets.AWS_SSM_TARGET }}
        run: |
          set -eu
          image_ref_q="$(jq -rn --arg v "${IMAGE_REF}" '$v|@sh')"
          aws_region_q="$(jq -rn --arg v "${AWS_REGION}" '$v|@sh')"
          deploy_command="IMAGE_REF=${image_ref_q} RESET_DB=1 INCLUDE_SEED=1 ./deploy.sh"
          commands_json="$(jq -n \
            --arg aws_region_q "${aws_region_q}" \
            --arg deploy_command "${deploy_command}" \
            '[
              "set -eu",
              "cd /opt/e2br3",
              "set -a",
              ". ./.env.prod",
              "set +a",
              "root_authority=${SERVICE_DB_ROOT_URL#*://}",
              "root_authority=${root_authority%%/*}",
              "root_hostport=${root_authority#*@}",
              "root_userinfo=${root_authority%@*}",
              "root_user=${root_userinfo%%:*}",
              "root_host=${root_hostport%%:*}",
              "root_port=${root_hostport#*:}",
              "if [ \"${root_port}\" = \"${root_hostport}\" ]; then root_port=5432; fi",
              "export PGPASSWORD=$(aws rds generate-db-auth-token --hostname \"${root_host}\" --port \"${root_port}\" --username \"${root_user}\" --region " + $aws_region_q + ")",
              $deploy_command
            ]'
          )"

          command_id="$(
            aws ssm send-command \
              --instance-ids "${AWS_SSM_TARGET}" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy ${IMAGE_REF}" \
              --parameters "commands=${commands_json}" \
              --query "Command.CommandId" \
              --output text
          )"

          echo "SSM command id: ${command_id}"
          aws ssm wait command-executed --command-id "${command_id}" --instance-id "${AWS_SSM_TARGET}" || true
          invocation_json="$(
            aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${AWS_SSM_TARGET}" \
              --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
              --output json
          )"
          echo "${invocation_json}"
          status="$(printf '%s' "${invocation_json}" | jq -r '.Status')"
          test "${status}" = "Success"

  terminology:
    name: Run Terminology Operation
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.operation == 'terminology-dry-run' || inputs.operation == 'terminology-load') }}

    steps:
      - name: Validate terminology inputs
        env:
          DICTIONARY: ${{ inputs.dictionary }}
          INPUT_PATH: ${{ inputs.input_path }}
          VERSION: ${{ inputs.version }}
          LANGUAGE: ${{ inputs.language }}
        run: |
          set -eu
          case "${DICTIONARY}" in
            meddra|whodrug) ;;
            *) echo "dictionary must be meddra or whodrug" >&2; exit 1 ;;
          esac
          test -n "${INPUT_PATH}"
          test -n "${VERSION}"
          test -n "${LANGUAGE}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run terminology operation via AWS Systems Manager
        env:
          AWS_SSM_TARGET: ${{ secrets.AWS_SSM_TARGET }}
          OPERATION: ${{ inputs.operation }}
          DICTIONARY: ${{ inputs.dictionary }}
          INPUT_PATH: ${{ inputs.input_path }}
          VERSION: ${{ inputs.version }}
          LANGUAGE: ${{ inputs.language }}
        run: |
          set -eu
          mode="load"
          if [ "${OPERATION}" = "terminology-dry-run" ]; then
            mode="dry-run"
          fi

          term_command="$(jq -rn \
            --arg mode "--${mode}" \
            --arg dictionary "${DICTIONARY}" \
            --arg input_path "${INPUT_PATH}" \
            --arg version "${VERSION}" \
            --arg language "${LANGUAGE}" \
            '["./terminology-load.sh", $mode, $dictionary, $input_path, $version, $language] | @sh'
          )"
          commands_json="$(jq -n \
            --arg term_command "${term_command}" \
            '[
              "set -eu",
              "cd /opt/e2br3",
              $term_command
            ]'
          )"

          command_id="$(
            aws ssm send-command \
              --instance-ids "${AWS_SSM_TARGET}" \
              --document-name "AWS-RunShellScript" \
              --comment "Terminology ${OPERATION}" \
              --parameters "commands=${commands_json}" \
              --query "Command.CommandId" \
              --output text
          )"

          echo "SSM command id: ${command_id}"
          aws ssm wait command-executed --command-id "${command_id}" --instance-id "${AWS_SSM_TARGET}" || true
          invocation_json="$(
            aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${AWS_SSM_TARGET}" \
              --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
              --output json
          )"
          echo "${invocation_json}"
          status="$(printf '%s' "${invocation_json}" | jq -r '.Status')"
          test "${status}" = "Success"
