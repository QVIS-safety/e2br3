name: Presave Reference Matrices

on:
  pull_request:
    paths:
      - "docs/reference-matrices/presave/**"
      - "scripts/validate_presave_reference_matrices.py"
      - ".github/workflows/presave-reference-matrices.yml"
  push:
    branches:
      - main
    paths:
      - "docs/reference-matrices/presave/**"
      - "scripts/validate_presave_reference_matrices.py"
      - ".github/workflows/presave-reference-matrices.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/validate_presave_reference_matrices.py
